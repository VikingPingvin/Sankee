name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for git describe --tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Build release artifacts
        run: |
          VERSION=$(git describe --tags --always --dirty)
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64  go build -trimpath -ldflags "${LDFLAGS}" -o dist/sankee-linux-amd64       .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64  go build -trimpath -ldflags "${LDFLAGS}" -o dist/sankee-linux-arm64       .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64  go build -trimpath -ldflags "${LDFLAGS}" -o dist/sankee-darwin-amd64      .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64  go build -trimpath -ldflags "${LDFLAGS}" -o dist/sankee-darwin-arm64      .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64  go build -trimpath -ldflags "${LDFLAGS}" -o dist/sankee-windows-amd64.exe .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
